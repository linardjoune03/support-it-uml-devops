version: '3.8'

services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=support_it
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=monsecretjwttreslongetcomplique123
      - FRONTEND_URL=http://localhost:8080
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=support_it
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
